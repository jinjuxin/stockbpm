    <header class="site-header">

          <div class="brand-badge">脱</div>

        <nav class="nav">

          <aside class="card">
            <h3>新闻列表</h3>
            <div class="news-list">
              <div class="news-item"><span>企业新闻 / 2026-04-20</span><h3 style="margin:8px 0 0;font-size:22px;">新品类渠道合作进入新阶段</h3></div>
