<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>页面模板</title>
    <style>
      :root {
        --bg: #f6f8fa;
        --card: #ffffff;
        --text: #1f2328;
        --muted: #57606a;
        --primary: #0969da;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .container {
        max-width: 960px;
        margin: 48px auto;
        padding: 0 16px;
      }

      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 10px rgba(31, 35, 40, 0.08);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 8px;
      }

      p {
        color: var(--muted);
        line-height: 1.7;
      }

      .btn {
        display: inline-block;
        margin-top: 12px;
        padding: 10px 16px;
        border-radius: 8px;
        color: #fff;
        background: var(--primary);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>HTML 模板</h1>
        <p>这是一个可直接复用的基础页面模板，你可以替换标题、正文和按钮链接。</p>
        <a class="btn" href="#">开始使用</a>
      </section>
    </main>
  </body>
</html>
