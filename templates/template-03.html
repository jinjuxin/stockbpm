<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模板 03</title>
    <style>
      :root {
        --primary: #2563eb;
        --bg: #f8fafc;
        --text: #0f172a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container { width: min(1080px, 92%); margin: 0 auto; }
      header {
        background: linear-gradient(135deg, #1d4ed8, #3b82f6);
        color: #fff;
        padding: 18px 0;
      }
      nav { display: flex; justify-content: space-between; align-items: center; }
      .menu { display: flex; gap: 16px; }
      .menu a { color: #fff; text-decoration: none; }
      .hero { padding: 56px 0 24px; text-align: center; }
      .hero h1 { margin: 0 0 10px; font-size: clamp(1.8rem, 3vw, 2.8rem); }
      .hero p { margin: 0 auto; max-width: 620px; color: #475569; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin: 30px 0;
      }
      .card {
        background: #fff;
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(2,6,23,.08);
      }
      footer { text-align: center; color: #64748b; padding: 24px 0 30px; }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <nav>
          <strong>Template BRAND</strong>
          <div class="menu">
            <a href="#">首页</a>
            <a href="#">服务</a>
            <a href="#">案例</a>
            <a href="#">联系</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>响应式首页模板</h1>
        <p>这是一个可复用的模板页面，适合企业官网、活动页、产品展示页快速起步。</p>
      </section>

      <section class="grid">
        <article class="card"><h3>功能模块 A</h3><p>用于展示核心能力。</p></article>
        <article class="card"><h3>功能模块 B</h3><p>用于展示服务亮点。</p></article>
        <article class="card"><h3>功能模块 C</h3><p>用于展示客户价值。</p></article>
      </section>
    </main>

    <footer>© 2026 Template BRAND</footer>
  </body>
</html>
