<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模板 10 - 联系我们</title>
    <style>
      :root { --bg:#eff6ff; --text:#13233f; --muted:#5d6f8e; --accent:#2563eb; --card:#ffffff; }
      * { box-sizing:border-box; }
      body { margin:0; font-family:"Microsoft YaHei",sans-serif; background:
        linear-gradient(135deg,rgba(37,99,235,.12),transparent 35%),
        linear-gradient(315deg,rgba(14,165,233,.12),transparent 38%),
        var(--bg); color:var(--text); }
      .wrap { width:min(1100px,92%); margin:0 auto; padding:38px 0 42px; }
      .title { text-align:center; margin-bottom:24px; }
      .layout { display:grid; grid-template-columns:.9fr 1.1fr; gap:18px; }
      .card { background:rgba(255,255,255,.92); border-radius:24px; padding:28px; box-shadow:0 16px 36px rgba(37,99,235,.08); }
      .item { margin-bottom:18px; }
      label { display:block; margin-bottom:6px; color:var(--muted); }
      input,textarea { width:100%; padding:12px 14px; border-radius:12px; border:1px solid #d7e2f2; }
      textarea { min-height:120px; resize:vertical; }
      button { padding:12px 20px; border:0; border-radius:12px; background:var(--accent); color:#fff; font-size:15px; }
      @media (max-width: 760px) { .layout { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="title">
        <h1>联系团队或提交需求</h1>
        <p>适合作为咨询页、售前表单页或服务支持入口。</p>
      </section>
      <section class="layout">
        <article class="card">
          <h3>联系方式</h3>
          <p>电话：400-800-2026</p>
          <p>邮箱：service@stockbpm.local</p>
          <p>地址：上海市浦东新区流程大道 88 号</p>
        </article>
        <article class="card">
          <h3>留言表单</h3>
          <div class="item"><label>姓名</label><input type="text" placeholder="请输入姓名" /></div>
          <div class="item"><label>联系方式</label><input type="text" placeholder="手机号或邮箱" /></div>
          <div class="item"><label>需求描述</label><textarea placeholder="请简要描述你的流程场景"></textarea></div>
          <button type="button">提交信息</button>
        </article>
      </section>
    </main>
  </body>
</html>
