<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模板 01 - 企业官网</title>
    <style>
      :root { --bg:#f4f7fb; --card:#ffffff; --text:#172033; --muted:#5f6b85; --accent:#1d4ed8; }
      * { box-sizing:border-box; }
      body { margin:0; font-family:"Microsoft YaHei",sans-serif; background:linear-gradient(180deg,#eef4ff,#f8fbff); color:var(--text); }
      .wrap { width:min(1120px,92%); margin:0 auto; }
      header { padding:22px 0; }
      .nav { display:flex; justify-content:space-between; align-items:center; }
      .brand { font-size:24px; font-weight:700; }
      .menu { display:flex; gap:18px; color:var(--muted); }
      .hero { display:grid; grid-template-columns:1.3fr .9fr; gap:24px; padding:36px 0 28px; align-items:center; }
      .panel,.stats div { background:var(--card); border-radius:20px; box-shadow:0 18px 40px rgba(29,78,216,.08); }
      .panel { padding:36px; }
      h1 { margin:0 0 14px; font-size:44px; line-height:1.2; }
      p { color:var(--muted); line-height:1.8; }
      .cta { display:inline-block; margin-top:18px; padding:12px 20px; border-radius:999px; background:var(--accent); color:#fff; text-decoration:none; }
      .stats { display:grid; gap:16px; }
      .stats div { padding:22px; }
      .stats strong { display:block; font-size:30px; margin-bottom:6px; }
      .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; padding:10px 0 40px; }
      .card { background:var(--card); border-radius:18px; padding:22px; }
      footer { padding:0 0 32px; color:var(--muted); }
      @media (max-width: 760px) { .hero,.grid { grid-template-columns:1fr; } .menu { display:none; } h1 { font-size:34px; } }
    </style>
  </head>
  <body>
    <header class="wrap">
      <div class="nav">
        <div class="brand">StockBPM</div>
        <div class="menu"><span>首页</span><span>方案</span><span>案例</span><span>联系</span></div>
      </div>
    </header>
    <main class="wrap">
      <section class="hero">
        <div class="panel">
          <h1>面向流程管理的企业门户模板</h1>
          <p>适合做官网首页、产品入口或内部平台门户，强调品牌、核心指标和业务能力展示。</p>
          <a class="cta" href="#">立即体验</a>
        </div>
        <div class="stats">
          <div><strong>98%</strong><span>流程按时完成率</span></div>
          <div><strong>24h</strong><span>平均审批闭环时长</span></div>
          <div><strong>320+</strong><span>月活业务节点</span></div>
        </div>
      </section>
      <section class="grid">
        <article class="card"><h3>统一入口</h3><p>聚合待办、报表、配置和消息中心。</p></article>
        <article class="card"><h3>可视看板</h3><p>用卡片化布局展示业务健康度和重点预警。</p></article>
        <article class="card"><h3>快速定制</h3><p>文案、配色和模块都可以直接替换复用。</p></article>
      </section>
    </main>
    <footer class="wrap">© 2026 StockBPM 企业官网模板</footer>
  </body>
</html>
