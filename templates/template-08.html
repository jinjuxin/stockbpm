<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模板 08 - 数据报表</title>
    <style>
      :root { --bg:#f2f7f7; --text:#102a2a; --muted:#557171; --accent:#0891b2; --card:#ffffff; }
      * { box-sizing:border-box; }
      body { margin:0; font-family:"Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); }
      .wrap { width:min(1140px,92%); margin:0 auto; padding:28px 0 40px; }
      .top { display:flex; justify-content:space-between; align-items:end; gap:16px; }
      .filters { display:flex; gap:10px; flex-wrap:wrap; }
      .chip { padding:8px 12px; border-radius:999px; background:#dff6fb; color:var(--accent); }
      .cards { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin:20px 0; }
      .card,.chart,.table { background:var(--card); border-radius:18px; padding:22px; }
      .card strong { display:block; font-size:30px; margin-bottom:6px; }
      .layout { display:grid; grid-template-columns:1.1fr .9fr; gap:14px; }
      table { width:100%; border-collapse:collapse; color:var(--muted); }
      td,th { padding:10px 0; border-bottom:1px solid #e6efef; text-align:left; }
      @media (max-width: 760px) { .cards,.layout { grid-template-columns:1fr; } .top { display:block; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="top">
        <div>
          <h1>业务报表模板</h1>
          <p>可作为管理驾驶舱、月报页面或数据复盘大屏的简版入口。</p>
        </div>
        <div class="filters"><span class="chip">本周</span><span class="chip">华东</span><span class="chip">采购流程</span></div>
      </section>
      <section class="cards">
        <div class="card"><strong>1,286</strong><span>总处理单量</span></div>
        <div class="card"><strong>93%</strong><span>按 SLA 完成</span></div>
        <div class="card"><strong>36m</strong><span>平均审批耗时</span></div>
        <div class="card"><strong>14</strong><span>异常驳回数</span></div>
      </section>
      <section class="layout">
        <article class="chart"><h3>图表占位</h3><p>这里适合接柱状图、折线图或热力图组件。</p></article>
        <article class="table">
          <h3>Top 5 节点</h3>
          <table>
            <tr><th>节点</th><th>耗时</th></tr>
            <tr><td>采购复核</td><td>42m</td></tr>
            <tr><td>财务确认</td><td>38m</td></tr>
            <tr><td>仓储验收</td><td>31m</td></tr>
          </table>
        </article>
      </section>
    </main>
  </body>
</html>
