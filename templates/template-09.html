<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模板 09 - 招聘页</title>
    <style>
      :root { --bg:#fff7ed; --text:#2a1707; --muted:#7c5a3f; --accent:#f97316; --card:#ffffff; }
      * { box-sizing:border-box; }
      body { margin:0; font-family:"Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); }
      .wrap { width:min(1080px,92%); margin:0 auto; }
      .hero { padding:52px 0 24px; display:grid; grid-template-columns:1.05fr .95fr; gap:18px; align-items:center; }
      .block { background:var(--card); border-radius:22px; padding:28px; box-shadow:0 16px 30px rgba(249,115,22,.08); }
      h1 { margin:0 0 12px; font-size:42px; }
      .jobs { display:grid; gap:14px; padding-bottom:40px; }
      .job { background:#fff; border-left:6px solid #fdba74; border-radius:18px; padding:20px 22px; }
      .meta { color:var(--muted); font-size:14px; }
      @media (max-width: 760px) { .hero { grid-template-columns:1fr; } h1 { font-size:34px; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <div class="block">
          <h1>加入流程产品团队</h1>
          <p>这个模板适合招聘页、岗位宣传页或校园招聘专题页，重点展示团队、岗位和投递入口。</p>
        </div>
        <div class="block">
          <h3>我们提供</h3>
          <p>业务复杂度、系统建设空间、跨部门协作机会，以及可见的产品成长路径。</p>
        </div>
      </section>
      <section class="jobs">
        <article class="job"><h3>前端工程师</h3><p class="meta">上海 / 3-5 年 / React</p></article>
        <article class="job"><h3>流程产品经理</h3><p class="meta">上海 / 5 年以上 / B 端经验</p></article>
        <article class="job"><h3>实施顾问</h3><p class="meta">杭州 / 2-4 年 / 交付能力</p></article>
      </section>
    </main>
  </body>
</html>
