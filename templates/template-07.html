<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模板 07 - 个人中心</title>
    <style>
      :root { --bg:#f5f3ff; --text:#221b3d; --muted:#6c6490; --accent:#7c3aed; --card:#ffffff; }
      * { box-sizing:border-box; }
      body { margin:0; font-family:"Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); }
      .wrap { width:min(1120px,92%); margin:0 auto; padding:30px 0 42px; }
      .hero { display:grid; grid-template-columns:.9fr 1.1fr; gap:18px; }
      .profile,.panel { background:var(--card); border-radius:22px; padding:26px; box-shadow:0 14px 30px rgba(124,58,237,.08); }
      .avatar { width:76px; height:76px; border-radius:50%; background:linear-gradient(135deg,#a78bfa,#7c3aed); margin-bottom:14px; }
      .list { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:18px; }
      .item { background:#f7f5ff; border-radius:16px; padding:18px; }
      .timeline { display:grid; gap:12px; margin-top:14px; }
      .timeline div { padding:14px 16px; border-left:4px solid #c4b5fd; background:#faf8ff; border-radius:10px; }
      @media (max-width: 760px) { .hero,.list { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <aside class="profile">
          <div class="avatar"></div>
          <h2>张小青</h2>
          <p>运营负责人 / 华东区</p>
          <p>模板适合做个人工作台、员工中心或账号主页。</p>
        </aside>
        <section class="panel">
          <h2>我的工作概览</h2>
          <div class="list">
            <div class="item"><strong>12</strong><p>待办任务</p></div>
            <div class="item"><strong>4</strong><p>发起中流程</p></div>
            <div class="item"><strong>96%</strong><p>本月及时率</p></div>
          </div>
          <div class="timeline">
            <div>09:30 完成采购审批复核</div>
            <div>11:10 发起仓储盘点流程</div>
            <div>14:00 跟进合同盖章节点</div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
