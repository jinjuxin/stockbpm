<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模板 02 - 仪表盘</title>
    <style>
      :root { --bg:#0f172a; --panel:#111c34; --card:#18233f; --text:#e5eefc; --muted:#8da2c9; --accent:#22c55e; }
      * { box-sizing:border-box; }
      body { margin:0; font-family:"Microsoft YaHei",sans-serif; background:radial-gradient(circle at top,#1e293b,#0f172a 55%); color:var(--text); }
      .wrap { width:min(1140px,92%); margin:0 auto; }
      header { padding:22px 0; }
      .top { display:flex; justify-content:space-between; align-items:center; }
      .brand { font-weight:700; letter-spacing:1px; }
      .hero { background:rgba(24,35,63,.86); border:1px solid rgba(141,162,201,.18); border-radius:24px; padding:28px; }
      .hero h1 { margin:0 0 10px; font-size:40px; }
      .hero p { margin:0; color:var(--muted); }
      .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; padding:22px 0; }
      .metric,.feed article { background:var(--card); border-radius:18px; padding:20px; }
      .metric strong { display:block; font-size:28px; color:var(--accent); margin-bottom:6px; }
      .feed { display:grid; grid-template-columns:1.2fr .8fr; gap:14px; padding-bottom:34px; }
      .list { display:grid; gap:12px; }
      .tag { display:inline-block; padding:4px 10px; border-radius:999px; background:rgba(34,197,94,.14); color:#8ef0b0; font-size:12px; }
      @media (max-width: 760px) { .metrics,.feed { grid-template-columns:1fr; } .hero h1 { font-size:32px; } }
    </style>
  </head>
  <body>
    <header class="wrap">
      <div class="top"><div class="brand">StockBPM / Dashboard</div><div>2026-04</div></div>
    </header>
    <main class="wrap">
      <section class="hero">
        <span class="tag">实时运营</span>
        <h1>流程运行总览模板</h1>
        <p>适合接业务数据接口后直接做首页仪表盘，突出 KPI、预警和待办列表。</p>
      </section>
      <section class="metrics">
        <div class="metric"><strong>126</strong><span>今日新建流程</span></div>
        <div class="metric"><strong>18</strong><span>超时节点</span></div>
        <div class="metric"><strong>89%</strong><span>一次通过率</span></div>
        <div class="metric"><strong>6</strong><span>高优先级告警</span></div>
      </section>
      <section class="feed">
        <article>
          <h3>核心趋势</h3>
          <p>这里可以接折线图、柱状图或漏斗图，用于展示流程量、审批效率和异常趋势。</p>
        </article>
        <div class="list">
          <article><h3>待处理</h3><p>采购审批 8 项，合同归档 3 项，付款复核 2 项。</p></article>
          <article><h3>风险提醒</h3><p>仓储出库流程平均耗时较昨日上升 16%。</p></article>
        </div>
      </section>
    </main>
  </body>
</html>
