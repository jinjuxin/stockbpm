<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockBPM 首页</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-weight: 700;
      font-size: 20px;
      color: var(--primary);
    }

    .nav {
      display: flex;
      gap: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .hero {
      padding: 72px 0 40px;
    }

    .hero-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
    }

    .hero h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.3;
    }

    .hero p {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-ghost {
      background: #eef2ff;
      color: var(--primary);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      padding: 8px 0 48px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
    }

    .card h3 {
      margin: 0;
      font-size: 16px;
    }

    .card p {
      margin: 10px 0 0;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .footer {
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      padding: 20px 0 32px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <div class="logo">StockBPM</div>
      <nav class="nav">
        <span>首页</span>
        <span>流程中心</span>
        <span>任务管理</span>
        <span>系统设置</span>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-card">
        <h1>欢迎使用 StockBPM 管理平台</h1>
        <p>这是一个可直接复用的首页模板，包含头部导航、欢迎区域、快捷操作和功能卡片。你可以替换文案并接入真实 API 数据。</p>
        <div class="actions">
          <button class="btn btn-primary">进入工作台</button>
          <button class="btn btn-ghost">查看文档</button>
        </div>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <h3>待办任务</h3>
        <p>快速查看当前待处理流程和审批任务，支持按优先级排序。</p>
      </article>
      <article class="card">
        <h3>流程监控</h3>
        <p>追踪流程状态、节点耗时与异常告警，保障流程稳定运行。</p>
      </article>
      <article class="card">
        <h3>数据看板</h3>
        <p>展示关键业务指标，支持按时间和维度进行筛选分析。</p>
      </article>
      <article class="card">
        <h3>系统公告</h3>
        <p>发布平台更新、维护通知及团队协作提醒。</p>
      </article>
    </section>
  </main>

  <footer class="footer">
    © 2026 StockBPM · 首页模板示例
  </footer>
</body>
</html>
