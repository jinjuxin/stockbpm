<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>首页模板</title>
    <style>
      :root {
        --primary: #2563eb;
        --bg: #f8fafc;
        --text: #0f172a;
        --muted: #475569;
        --card: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: var(--bg);
        line-height: 1.6;
      }

      .container {
        width: min(1100px, 92%);
        margin: 0 auto;
      }

      header {
        background: linear-gradient(120deg, #1d4ed8, #2563eb);
        color: #fff;
        padding: 18px 0;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        font-weight: 700;
        font-size: 1.1rem;
      }

      .menu {
        display: flex;
        gap: 18px;
      }

      .menu a {
        color: #fff;
        text-decoration: none;
        opacity: 0.95;
      }

      .hero {
        padding: 56px 0 36px;
        text-align: center;
      }

      .hero h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 3vw, 2.8rem);
      }

      .hero p {
        margin: 0 auto 24px;
        max-width: 640px;
        color: var(--muted);
      }

      .hero .cta {
        display: inline-block;
        background: var(--primary);
        color: #fff;
        padding: 10px 18px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
      }

      .section-title {
        margin: 18px 0;
        font-size: 1.3rem;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-bottom: 34px;
      }

      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 18px;
        box-shadow: 0 8px 30px rgba(2, 6, 23, 0.06);
      }

      .card h3 {
        margin-top: 0;
      }

      footer {
        padding: 18px 0 28px;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container nav">
        <div class="logo">Template Brand</div>
        <nav class="menu">
          <a href="#">首页</a>
          <a href="#">功能</a>
          <a href="#">价格</a>
          <a href="#">联系我们</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>一个通用的首页模板</h1>
        <p>
          适合用于产品官网、活动页面或企业站点。你可以快速替换文案和配色，作为项目起始页面。
        </p>
        <a class="cta" href="#">立即开始</a>
      </section>

      <section>
        <h2 class="section-title">核心模块</h2>
        <div class="cards">
          <article class="card">
            <h3>模块一</h3>
            <p>用于展示关键卖点或主要功能。</p>
          </article>
          <article class="card">
            <h3>模块二</h3>
            <p>用于补充优势、流程或服务说明。</p>
          </article>
          <article class="card">
            <h3>模块三</h3>
            <p>用于放置案例、数据或用户评价。</p>
          </article>
        </div>
      </section>
    </main>

    <footer>© 2026 Template Brand. All rights reserved.</footer>
  </body>
</html>
